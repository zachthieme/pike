notes_dir: ~/CloudDocs/Notes

include:
  - "**/*.md"

exclude:
  - "templates/**"
  - "archive/**"
  - "CLAUDE.md"
  - "reviews/**"

refresh_interval: 5s

editor: hx

link_color: "#6CB4EE"

tag_colors:
  risk: "#FF6B6B"
  due: "#FF6B6B"
  today: green
  completed: green
  weekly: "#5B9BD5"
  monthly: "#7B68EE"
  quarterly: "#9370DB"
  horizon: "#FFD93D"
  talk: magenta
  _default: cyan

views:
  - title: "Weekly"
    query: "open and @weekly"
    sort: due_asc
    color: "#4EC9B0"
    order: 1

  - title: "Today"
    query: "open and @today"
    sort: due_asc
    color: green
    order: 2

  - title: "Overdue"
    query: "open and @due < today"
    sort: due_asc
    color: red
    order: 3

  - title: "Next 3 Days"
    query: "open and @due >= today and @due <= today+3d"
    sort: due_asc
    color: yellow
    order: 4

  - title: "Talk"
    query: "open and @talk"
    sort: file
    color: magenta
    order: 5

  - title: "Horizon"
    query: "@risk or @horizon"
    sort: file
    color: "#DBA04D"
    order: 6

