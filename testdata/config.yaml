notes_dir: "testdata/notes"
include:
  - "**/*.md"
refresh_interval: "5s"
editor: "vi"
link_color: "#89b4fa"
hidden_color: "#6c7086"
visible_color: "#f5c2e7"
tag_colors:
  today: "#a6e3a1"
  risk: "#f38ba8"
  due: "#f38ba8"
  completed: "#a6e3a1"
  delegated: "#f9e2af"
  blocked: "#cba6f7"
  _default: "#94e2d5"
views:
  - title: "Overdue"
    query: "open and @due < today"
    sort: "due_asc"
    color: "#f38ba8"
    order: 1
  - title: "Today"
    query: "open and @today"
    sort: "file"
    color: "#a6e3a1"
    order: 2
  - title: "All Open"
    query: "open"
    sort: "file"
    color: "#89b4fa"
    order: 3
